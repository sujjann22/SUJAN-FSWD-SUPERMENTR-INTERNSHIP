<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Hero Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px 10%;
      background-color: #f0f8ff;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 40px;
      margin-bottom: 20px;
      color: #0d47a1;
    }

    .hero-text p {
      font-size: 16px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .hero-text button {
      padding: 12px 20px;
      border: none;
      background-color: #1565c0;
      color: white;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }

    .hero-image {
      flex: 1;
      text-align: center;
    }

    .hero-image img {
      max-width: 100%;
      height: auto;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 28px;
      }

      .hero-text {
        margin-bottom: 30px;
      }
    }

  </style>
</head>

<body>

  <section class="hero">
    
    <div class="hero-text">
      <h1>Welcome to My Website</h1>
      <p>
        This is a simple responsive hero section built using Flexbox.
        It adjusts automatically for mobile devices.
      </p>
      <button>Get Started</button>
    </div>

  </section>

</body>
</html>
